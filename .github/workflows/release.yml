name: Create release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-package:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [win, linux, osx]
        arch: [x64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run Publish Script
        shell: pwsh
        run: |
          ./publish.ps1 -Profiles "${{ matrix.os }}-${{ matrix.arch }}"

      - name: Zip Contents
        run: |
          # Navigate into the target directory to avoid nesting folders inside the zip
          cd "publish/${{ matrix.os }}-${{ matrix.arch }}"
          zip -r "../../Solace-${{ matrix.os }}-${{ matrix.arch }}.zip" .
          cd ../..

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Solace-${{ matrix.os }}-${{ matrix.arch }}
          path: Solace-${{ matrix.os }}-${{ matrix.arch }}.zip
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Prepare Configuration Files
        run: |
          cp src/Solace.AppHost/appsettings.Development.json ./artifacts/appsettings-AppHost.json
          cp src/Solace.Launcher/appsettings.json ./artifacts/appsettings-Launcher.json

      - name: Publish Release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            ./artifacts/Solace-*.zip \
            ./artifacts/appsettings-AppHost.json \
            ./artifacts/appsettings-Launcher.json \
            --title "${{ github.event.inputs.version }}" \
            --generate-notes \
            --latest